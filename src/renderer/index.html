<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'unsafe-inline'" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }
      #box {
        position: absolute;
        left: 240px;
        top: 240px;
        width: 96px;
        height: 96px;
        background: rgba(80, 160, 255, 0.92);
        border-radius: 18px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-family: -apple-system, system-ui, sans-serif;
        font-size: 13px;
        cursor: grab;
        user-select: none;
      }
      #box.dragging {
        cursor: grabbing;
      }
    </style>
  </head>
  <body>
    <div id="box">drag me</div>
    <script src="./spike.js"></script>
  </body>
</html>
