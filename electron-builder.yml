appId: com.desktoppet.app
productName: Desktop Pet
directories:
  output: release
files:
  - dist/**/*
  - package.json
mac:
  target:
    - dmg
  category: public.app-category.entertainment
  # v0.1 ships unsigned (no Apple Developer account). identity:null skips signing.
  identity: null
  # LSUIElement=1 -> menu-bar agent app, no Dock icon
  extendInfo:
    LSUIElement: 1
